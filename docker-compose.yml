version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: 8te-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: 8te

  backend:
    build: ./backend
    container_name: 8te-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/8te
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: 8te-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  mongodb_data:
